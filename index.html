<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacknovate'2025 Feedback Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Hacknovate'2025 Feedback Form</h1>
        <form id="feedbackForm">
            <div class="form-group">
                <label for="participantName">Name of the Participant:</label>
                <input type="text" id="participantName" name="participantName" required>
            </div>
            <div class="form-group">
                <label for="teamName">Team Name:</label>
                <input type="text" id="teamName" name="teamName" required>
            </div>
            <div class="form-group">
                <label for="venueReview">Review about Venue:</label>
                <textarea id="venueReview" name="venueReview" required></textarea>
            </div>
            <div class="form-group">
                <label for="foodReview">Review about Food:</label>
                <textarea id="foodReview" name="foodReview" required></textarea>
            </div>
            <div class="form-group">
                <label for="judgesReview">Review about Judges:</label>
                <textarea id="judgesReview" name="judgesReview" required></textarea>
            </div>
            <div class="form-group">
                <label for="overallExperience">Overall Experience:</label>
                <textarea id="overallExperience" name="overallExperience" required></textarea>
            </div>
            <button type="submit">Submit Feedback</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
