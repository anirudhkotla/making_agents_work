<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacknovate'2025 Feedback Form</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-rocket"></i> Hacknovate'2025 Feedback</h1>
        <form id="feedbackForm">
            <div class="form-group">
                <label for="name"><i class="fas fa-user"></i> Participant Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="team"><i class="fas fa-users"></i> Team Name:</label>
                <input type="text" id="team" name="team" required>
            </div>
            <div class="form-group">
                <label for="venue"><i class="fas fa-map-marker-alt"></i> Venue Review:</label>
                <textarea id="venue" name="venue" required></textarea>
            </div>
            <div class="form-group">
                <label for="food"><i class="fas fa-utensils"></i> Food Review:</label>
                <textarea id="food" name="food" required></textarea>
            </div>
            <div class="form-group">
                <label for="judges"><i class="fas fa-gavel"></i> Judges Review:</label>
                <textarea id="judges" name="judges" required></textarea>
            </div>
            <div class="form-group">
                <label for="experience"><i class="fas fa-star"></i> Overall Experience:</label>
                <textarea id="experience" name="experience" required></textarea>
            </div>
            <button type="submit"><i class="fas fa-paper-plane"></i> Submit Feedback</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
